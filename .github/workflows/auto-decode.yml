name: Auto Decode LunaTV jin18
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: pip install base58 requests

      - name: Fetch and decode
        run: |
          cat > decode.py << 'EOF'
          import requests
          import base58

          # 下载加密文件
          url = "https://raw.githubusercontent.com/hafrey1/LunaTV-config/main/jin18.txt"
          r = requests.get(url, timeout=10)
          r.raise_for_status()
          enc = r.text.strip()

          # 解码
          raw = base58.b58decode(enc)
          json_data = raw.decode("utf-8")

          # 输出最终文件
          with open("lunatv.json", "w", encoding="utf-8") as f:
              f.write(json_data)
          print("✅ 解码完成，生成 lunatv.json")
          EOF

          python3 decode.py

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add lunatv.json
          git commit -m "Auto update lunatv.json" || exit 0
          git push
