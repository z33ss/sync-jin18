name: 定时同步 jin18.txt 到 Gitee

on:
  schedule:
    - cron: '0 */6 * * *'     # 每 6 小时同步一次（北京时间大概每 6 小时）
  workflow_dispatch:          # 支持手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gitee 仓库
        uses: actions/checkout@v4
        with:
          repository: z33ss/box     # ← 改成你的 Gitee 仓库
          token: ${{ secrets.GITEE_TOKEN }}
          ref: main
          persist-credentials: true

      - name: 下载最新 jin18.txt
        run: |
          curl -f -L -o jin18.txt "https://raw.githubusercontent.com/hafrey1/LunaTV-config/refs/heads/main/jin18.txt"

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jin18.txt
          git commit -m "自动同步 jin18.txt $(date +'%Y-%m-%d %H:%M:%S')" || echo "没有更新"
          git push
